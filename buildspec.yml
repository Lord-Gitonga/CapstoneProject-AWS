version: 0.2

phases:
  pre_build:
    commands:
      - echo Logging in to Amazon ECR...
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com
      - REPOSITORY_URI=$AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$IMAGE_REPO_NAME
      - COMMIT_HASH=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c 1-7)
      - IMAGE_TAG=${COMMIT_HASH:=latest}
  build:
    commands:
      - echo Build started on `date`
      - echo Building the Docker image...
      - docker build -t $IMAGE_REPO_NAME:$IMAGE_TAG .
      - docker tag $IMAGE_REPO_NAME:$IMAGE_TAG $REPOSITORY_URI:$IMAGE_TAG
  post_build:
    commands:
      - echo Build completed on `date`
      - echo Pushing the Docker image...
      - docker push $REPOSITORY_URI:$IMAGE_TAG
      - echo Creating imageDetail.json
      - printf '{"ImageURI":"%s"}' $REPOSITORY_URI:$IMAGE_TAG > imageDetail.json
      - echo Creating appspec.yml with explicit formatting
      - |
        cat > appspec.yml << 'EOF'
        version: 0.0
        Resources:
          - TargetService:
              Type: AWS::ECS::Service
              Properties:
                TaskDefinition: <TASK_DEFINITION>
                LoadBalancerInfo:
                  ContainerName: "myapp"
                  ContainerPort: 3000
        EOF
      - echo "=== DEBUGGING APPSPEC FILE ==="
      - echo "File exists check:"
      - ls -la appspec.yml
      - echo "File content:"
      - cat appspec.yml
      - echo "File encoding check:"
      - file appspec.yml
      - echo "YAML validation:"
      - python3 -c "import yaml; yaml.safe_load(open('appspec.yml'))" && echo "YAML is valid" || echo "YAML is invalid"
      - echo "Hex dump (first 200 bytes):"
      - hexdump -C appspec.yml | head -10

artifacts:
  files:
    - imageDetail.json
    - appspec.yml
  name: myapp-$(date +%Y-%m-%d)
