version: 0.2

phases:
  pre_build:
    commands:
      - echo Logging in to Amazon ECR...
      - aws ecr get-login-password --region eu-north-1 | docker login --username AWS --password-stdin 422653419447.dkr.ecr.eu-north-1.amazonaws.com
      - COMMIT_HASH=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c 1-7)
      - IMAGE_TAG=${COMMIT_HASH:=latest}
      
  build:
    commands:
      - echo Build started on `date`
      - echo "Building Docker image..."
      - docker build -t myapp-repo:$IMAGE_TAG ./src
      - echo "Docker build completed"
      - docker images
      - echo "Tagging for ECR..."
      - docker tag myapp-repo:$IMAGE_TAG 422653419447.dkr.ecr.eu-north-1.amazonaws.com/myapp-repo:$IMAGE_TAG
      - docker tag myapp-repo:$IMAGE_TAG 422653419447.dkr.ecr.eu-north-1.amazonaws.com/myapp-repo:latest
      - echo "Images after tagging:"
      - docker images

  post_build:
    commands:
      - echo Build completed on `date`
      - docker push 422653419447.dkr.ecr.eu-north-1.amazonaws.com/myapp-repo:$IMAGE_TAG
      - docker push 422653419447.dkr.ecr.eu-north-1.amazonaws.com/myapp-repo:latest

artifacts:
  files:
    - imagedefinitions.json
